<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas — Student</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="student-page">

    <!-- ── GROUP SELECTION SCREEN ── -->
    <div id="group-select-screen">
        <div id="group-select-wrap">
            <div class="student-logo">🎨</div>
            <h1 class="student-title">Canvas</h1>
            <p class="student-subtitle">Select your group number to begin</p>
            <div id="group-grid">
                <!-- Injected by JS -->
            </div>
        </div>
    </div>

    <!-- ── GAME SCREEN ── -->
    <div id="game-screen">

        <header id="game-header">
            <div id="group-chip">
                <span id="group-chip-dot">●</span>
                Group <span id="group-chip-num">—</span>
            </div>
            <div id="conn-status" class="conn-offline">⚪ Connecting</div>
            <button id="change-group-btn">Change Group</button>
        </header>

        <main id="game-main">

            <!-- Waiting State -->
            <div id="waiting-state">
                <div class="waiting-anim">⏳</div>
                <h2>Waiting for teacher...</h2>
                <p>The teacher will start the next section soon.<br>Please stand by.</p>
            </div>

            <!-- Active Phase Form -->
            <div id="phase-form">
                <div id="phase-chip">
                    <span id="phase-chip-emoji"></span>
                    <span id="phase-chip-label"></span>
                </div>
                <p id="phase-desc"></p>
                <textarea
                    id="note-textarea"
                    placeholder="Type your observation here..."
                    rows="5"
                    maxlength="200"
                ></textarea>
                <div id="char-count">0 / 200</div>
                <button id="submit-btn">Submit Note</button>
                <div id="submit-feedback">✅ Note submitted!</div>
            </div>

        </main>
    </div>

    <script>
        const PHASES = {
            // ── Empathy Map ──
            think_feel: {
                label: 'Think & Feel', emoji: '🧠',
                color: '#FCE4EC', accent: '#E91E63',
                desc: 'What is the user thinking or feeling internally? Their worries, aspirations, and what truly matters to them.'
            },
            see: {
                label: 'See', emoji: '👀',
                color: '#FFF3E0', accent: '#F59E0B',
                desc: 'What does the user see in their environment? Their surroundings, the media they consume, the people around them.'
            },
            hear: {
                label: 'Hear', emoji: '👂',
                color: '#F3E5F5', accent: '#9C27B0',
                desc: 'What does the user hear? What do friends, colleagues, or influencers say that affects them?'
            },
            say_do: {
                label: 'Say & Do', emoji: '🗣️',
                color: '#E8F5E9', accent: '#4CAF50',
                desc: 'What does the user say and do publicly? Observable behavior, attitude, and how they present themselves.'
            },
            pain: {
                label: 'Pain', emoji: '😖',
                color: '#FFEBEE', accent: '#F44336',
                desc: 'What are the user\'s biggest fears, frustrations, and obstacles standing between them and their goals?'
            },
            gain: {
                label: 'Gain', emoji: '😍',
                color: '#E3F2FD', accent: '#2196F3',
                desc: 'What does the user want to achieve or gain? What does success look like for them?'
            },
            solutions: {
                label: 'Solutions', emoji: '💡',
                color: '#E0F7FA', accent: '#00BCD4',
                desc: 'Based on the pain points identified, what solutions can we propose to address the user\'s needs?'
            },
            // ── SCAMPER ──
            substitute: {
                label: 'Substitute 替換', emoji: '🔄',
                color: '#FFE4E4', accent: '#FF6B6B',
                desc: '有什麼可以被替換？試著替換掉某個元素、材料、角色或規則，看看會有什麼改變。'
            },
            combine: {
                label: 'Combine 結合', emoji: '🔗',
                color: '#FFF0E0', accent: '#FF922B',
                desc: '有什麼可以結合在一起？將兩個以上的概念、功能或產品融合，創造新的可能性。'
            },
            adapt: {
                label: 'Adapt 調整', emoji: '🔧',
                color: '#FFFDE7', accent: '#D97706',
                desc: '有什麼可以從其他地方借用或調整？參考不同領域的做法，應用到目前的問題上。'
            },
            modify: {
                label: 'Modify 修改', emoji: '✏️',
                color: '#F0FDF4', accent: '#16A34A',
                desc: '有什麼可以放大、縮小或修改？改變形狀、大小、顏色或屬性，強調或弱化某些特質。'
            },
            put_to_use: {
                label: 'Put to Use 另作他用', emoji: '♻️',
                color: '#F0FDFA', accent: '#0D9488',
                desc: '這個東西還能用在哪裡？把現有的元素或方法放到不同情境或對象，發現新用途。'
            },
            eliminate: {
                label: 'Eliminate 消除', emoji: '✂️',
                color: '#EFF6FF', accent: '#2563EB',
                desc: '有什麼可以去掉或簡化？移除不必要的環節，讓整體更精簡、更聚焦。'
            },
            reverse: {
                label: 'Reverse 逆轉', emoji: '🔃',
                color: '#F5F3FF', accent: '#7C3AED',
                desc: '如果把順序顛倒、角色對調、或換個方向來思考呢？逆向操作往往能帶來意外的突破。'
            }
        };

        const GROUP_COLORS = [
            '#FFD43B', '#FF6B6B', '#51CF66', '#339AF0', '#FF922B',
            '#CC5DE8', '#20C997', '#F783AC', '#74C0FC', '#A9E34B'
        ];

        const socket = io();
        let myGroup = localStorage.getItem('empathy_group');
        let currentPhase = null;

        // ── Screen Management ──
        const groupSelectScreen = document.getElementById('group-select-screen');
        const gameScreen = document.getElementById('game-screen');

        function showGroupSelect() {
            groupSelectScreen.style.display = 'flex';
            gameScreen.style.display = 'none';
        }

        function showGame() {
            groupSelectScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            const color = GROUP_COLORS[(parseInt(myGroup) - 1) % GROUP_COLORS.length];
            document.documentElement.style.setProperty('--group-color', color);
            document.getElementById('group-chip-dot').style.color = color;
            document.getElementById('group-chip-num').textContent = myGroup;
            socket.emit('set_group', myGroup);
        }

        // ── Group Selection ──
        const groupGrid = document.getElementById('group-grid');
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'group-sel-btn';
            btn.textContent = `Group ${i}`;
            btn.style.backgroundColor = GROUP_COLORS[i - 1];
            btn.addEventListener('click', () => {
                myGroup = String(i);
                localStorage.setItem('empathy_group', myGroup);
                showGame();
                applyPhase(currentPhase);
            });
            groupGrid.appendChild(btn);
        }

        document.getElementById('change-group-btn').addEventListener('click', () => {
            localStorage.removeItem('empathy_group');
            myGroup = null;
            showGroupSelect();
        });

        // ── Phase UI ──
        const waitingEl = document.getElementById('waiting-state');
        const formEl = document.getElementById('phase-form');

        function applyPhase(phase) {
            currentPhase = phase;
            if (phase && PHASES[phase]) {
                const p = PHASES[phase];
                waitingEl.style.display = 'none';
                formEl.style.display = 'flex';
                document.getElementById('phase-chip-emoji').textContent = p.emoji;
                document.getElementById('phase-chip-label').textContent = p.label;
                document.getElementById('phase-desc').textContent = p.desc;
                document.documentElement.style.setProperty('--phase-color', p.color);
                document.documentElement.style.setProperty('--phase-accent', p.accent);
                document.getElementById('note-textarea').value = '';
                document.getElementById('char-count').textContent = '0 / 200';
                document.getElementById('submit-feedback').style.display = 'none';
                document.getElementById('note-textarea').focus();
            } else {
                waitingEl.style.display = 'flex';
                formEl.style.display = 'none';
            }
        }

        // ── Char Counter ──
        document.getElementById('note-textarea').addEventListener('input', function () {
            document.getElementById('char-count').textContent = `${this.value.length} / 200`;
        });

        // ── Submit ──
        document.getElementById('submit-btn').addEventListener('click', () => {
            const content = document.getElementById('note-textarea').value.trim();
            if (!content) {
                document.getElementById('note-textarea').focus();
                return;
            }
            if (!currentPhase || !myGroup) return;
            socket.emit('submit_note', { category: currentPhase, group: myGroup, content });
            document.getElementById('note-textarea').value = '';
            document.getElementById('char-count').textContent = '0 / 200';
            const fb = document.getElementById('submit-feedback');
            fb.style.display = 'block';
            setTimeout(() => { fb.style.display = 'none'; }, 2500);
        });

        // Also allow Enter + Ctrl/Cmd to submit
        document.getElementById('note-textarea').addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                document.getElementById('submit-btn').click();
            }
        });

        // ── Socket Events ──
        socket.on('connect', () => {
            document.getElementById('conn-status').textContent = '🟢 Connected';
            document.getElementById('conn-status').className = 'conn-online';
            if (myGroup) socket.emit('set_group', myGroup);
        });
        socket.on('disconnect', () => {
            document.getElementById('conn-status').textContent = '🔴 Disconnected';
            document.getElementById('conn-status').className = 'conn-offline';
        });
        socket.on('init_data', ({ currentPhase: p }) => applyPhase(p));
        socket.on('phase_changed', applyPhase);
        socket.on('template_changed', ({ phase }) => applyPhase(phase));
        socket.on('restarted', () => applyPhase(null));

        // ── Init ──
        if (myGroup) {
            showGame();
        } else {
            showGroupSelect();
        }
    </script>
</body>
</html>
